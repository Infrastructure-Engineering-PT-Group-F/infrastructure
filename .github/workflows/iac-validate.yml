---
name: iac-validate

on: [push, pull_request]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: terraform fmt
        run: terraform fmt -check -recursive

      # Validate every module directory (auto-discovered), so new modules
      # (e.g. bootstrap/, platform/) are covered without editing this workflow.
      # -backend=false: validation needs no remote state and no cloud creds.
      - name: terraform validate (per module)
        run: |
          set -euo pipefail
          modules=$(find . -type f -name '*.tf' \
            -not -path '*/.terraform/*' -printf '%h\n' | sort -u)
          for d in $modules; do
            echo "::group::validate $d"
            terraform -chdir="$d" init -backend=false
            terraform -chdir="$d" validate -no-color
            echo "::endgroup::"
          done
