---
# Enforces Conventional Commits, per the project workflow rules.
# Mirrors the official commitlint CI setup:
#   https://commitlint.js.org/guides/ci-setup.html
name: commitlint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install -D @commitlint/cli@21.0.1 @commitlint/config-conventional@21.0.1

      - name: Validate the latest commit (push)
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

      - name: Validate all PR commits (pull_request)
        if: github.event_name == 'pull_request'
        run: >-
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
